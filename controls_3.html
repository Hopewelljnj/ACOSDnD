<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Controller</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0e0e;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #e8c547;
      --text: #f0ede6;
      --muted: #666;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header { margin-bottom: 3rem; }

    .label-tag {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      display: inline-block;
      padding: 0.25rem 0.6rem;
      margin-bottom: 1.2rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    .sub {
      margin-top: 0.75rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
    }

    .panel-title {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .drag-hint {
      font-size: 0.6rem;
      color: #3a3a3a;
      letter-spacing: 0.05em;
    }

    /* ---- Options list ---- */
    .options {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .option {
      position: relative;
      cursor: grab;
      user-select: none;
      display: flex;
      align-items: stretch;
      gap: 0;
    }

    .option:active { cursor: grabbing; }

    .option input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .option label {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.2rem;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, opacity 0.15s;
      position: relative;
      overflow: hidden;
    }

    .option label::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transition: transform 0.2s;
    }

    .option input:checked + label {
      border-color: var(--accent);
      background: rgba(232, 197, 71, 0.05);
    }

    .option input:checked + label::before { transform: scaleY(1); }
    .option label:hover { border-color: #444; }

    /* Drag handle */
    .drag-handle {
      display: flex;
      flex-direction: column;
      gap: 3px;
      flex-shrink: 0;
      padding: 2px 0;
      opacity: 0.25;
      transition: opacity 0.2s;
      cursor: grab;
    }

    .option:hover .drag-handle { opacity: 0.6; }

    .drag-handle span {
      display: block;
      width: 14px;
      height: 1.5px;
      background: var(--muted);
    }

    /* Drag states */
    .option.dragging { opacity: 0.35; }

    .option.drag-over label {
      border-color: var(--accent);
      background: rgba(232, 197, 71, 0.08);
    }

    .drop-indicator {
      height: 2px;
      background: var(--accent);
      margin: -0.375rem 0;
      opacity: 0;
      transition: opacity 0.15s;
      pointer-events: none;
    }

    .drop-indicator.visible { opacity: 1; }

    /* Radio indicator */
    .radio-indicator {
      width: 16px;
      height: 16px;
      border: 1.5px solid var(--muted);
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
    }

    .option input:checked + label .radio-indicator { border-color: var(--accent); }

    .radio-indicator::after {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      transform: scale(0);
      transition: transform 0.2s;
    }

    .option input:checked + label .radio-indicator::after { transform: scale(1); }

    .option-content { flex: 1; }

    .option-name {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
    }

    .option-desc {
      font-size: 0.68rem;
      color: var(--muted);
      margin-top: 0.2rem;
    }

    .option-num {
      font-size: 0.65rem;
      color: var(--border);
      letter-spacing: 0.1em;
      min-width: 1.8rem;
      text-align: right;
    }

    .option input:checked + label .option-num { color: var(--accent); }

    /* Per-row pan toggle */
    .pan-toggle {
      flex-shrink: 0;
      width: 38px;
      border: 1px solid var(--border);
      border-left: none;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .pan-toggle::after {
      content: '';
      width: 8px;
      height: 8px;
      background: #2a2a2a;
      transition: background 0.2s;
    }

    .pan-toggle.included {
      border-color: var(--border);
      background: rgba(232,197,71,0.05);
    }

    .pan-toggle.included::after {
      background: var(--accent);
    }

    .pan-toggle:hover {
      background: rgba(255,255,255,0.03);
    }

    .option.pan-excluded label {
      opacity: 0.38;
    }

    .option.pan-excluded .pan-toggle::after {
      background: #1e1e1e;
    }

    /* Status bar */
    .status-bar {
      margin-top: 1.5rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #3a3a3a;
      display: inline-block;
      margin-right: 0.4rem;
      transition: background 0.3s;
    }

    .status-dot.active {
      background: #4caf50;
      box-shadow: 0 0 6px #4caf5088;
    }

    /* Auto-pan panel */
    .autopan-panel {
      margin-top: 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 1.4rem 2rem;
    }

    .autopan-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .autopan-label { display: flex; flex-direction: column; gap: 0.25rem; }

    .autopan-label .title {
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text);
      letter-spacing: 0.05em;
    }

    .autopan-label .desc { font-size: 0.65rem; color: var(--muted); }

    .toggle-wrap { flex-shrink: 0; }
    .toggle-input { display: none; }

    .toggle-track {
      display: block;
      width: 48px;
      height: 26px;
      background: #222;
      border: 1px solid var(--border);
      position: relative;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
    }

    .toggle-input:checked + .toggle-track {
      background: var(--accent);
      border-color: var(--accent);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 18px; height: 18px;
      background: var(--muted);
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1), background 0.25s;
    }

    .toggle-input:checked + .toggle-track .toggle-thumb {
      transform: translateX(22px);
      background: var(--bg);
    }

    .speed-row {
      margin-top: 1.2rem;
      padding-top: 1.2rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0.35;
      transition: opacity 0.3s;
    }

    .speed-row.enabled { opacity: 1; }

    .speed-row label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 2px;
      background: var(--border);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: var(--accent);
      cursor: pointer;
      border-radius: 0;
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px; height: 14px;
      background: var(--accent);
      border: none;
      border-radius: 0;
      cursor: pointer;
    }

    .speed-val {
      font-size: 0.65rem;
      color: var(--accent);
      min-width: 2.5rem;
      text-align: right;
    }

    .link-hint {
      margin-top: 2rem;
      padding: 1rem 1.2rem;
      border: 1px dashed var(--border);
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .link-hint strong { color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="label-tag">Controller</div>
      <h1>Image<br /><span>Select</span></h1>
      <p class="sub">// choose a scene — display.html updates live</p>
    </div>

    <div class="panel">
      <div class="panel-title">
        <span>— Scene Selection</span>
        <span class="drag-hint">drag to reorder</span>
      </div>
      <div class="options" id="options"></div>

      <div class="status-bar">
        <div>
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">no scene selected</span>
        </div>
        <div id="timestamp">—</div>
      </div>
    </div>

    <div class="autopan-panel">
      <div class="autopan-row">
        <div class="autopan-label">
          <div class="title">Auto-Pan</div>
          <div class="desc">Cycle through scenes in list order</div>
        </div>
        <div class="toggle-wrap">
          <input type="checkbox" id="autopanToggle" class="toggle-input" />
          <label for="autopanToggle" class="toggle-track">
            <div class="toggle-thumb"></div>
          </label>
        </div>
      </div>
      <div class="speed-row" id="speedRow">
        <label>Interval</label>
        <input type="range" id="speedSlider" min="2" max="15" value="5" step="1" />
        <div class="speed-val" id="speedVal">5s</div>
      </div>
    </div>

    <div class="link-hint">
      Open <strong>display.html</strong> in another tab or window.<br />
      The image there will update automatically when you pick a scene.
    </div>
  </div>

  <script>
    const SCENES = {
      mountains: { label: 'Mountains', desc: 'Alpine peaks, snow-capped ridges',  url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1400&q=80' },
      ocean:     { label: 'Ocean',     desc: 'Coastal waves, open water',          url: 'https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1400&q=80' },
      forest:    { label: 'Forest',    desc: 'Dense canopy, dappled light',        url: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=1400&q=80' },
      city:      { label: 'City',      desc: 'Urban skyline, architecture',        url: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1400&q=80' },
      desert:    { label: 'Desert',    desc: 'Dunes, vast open sky',               url: 'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=1400&q=80' },
      aurora:    { label: 'Aurora',    desc: 'Northern lights, polar skies',       url: 'https://images.unsplash.com/photo-1531366936337-7c912a4589a7?w=1400&q=80' },
    };

    // Persisted order
    let order = JSON.parse(localStorage.getItem('sceneOrder') || 'null') || Object.keys(SCENES);
    // Ensure aurora is included if upgrading from old version
    Object.keys(SCENES).forEach(k => { if (!order.includes(k)) order.push(k); });

    // Per-scene pan inclusion — default all enabled
    let panEnabled = JSON.parse(localStorage.getItem('panEnabled') || 'null') || {};
    Object.keys(SCENES).forEach(k => { if (!(k in panEnabled)) panEnabled[k] = true; });

    function savePanEnabled() {
      localStorage.setItem('panEnabled', JSON.stringify(panEnabled));
    }

    function panOrder() {
      return order.filter(k => panEnabled[k]);
    }

    const optionsEl  = document.getElementById('options');
    const dot        = document.getElementById('statusDot');
    const text       = document.getElementById('statusText');
    const tsEl       = document.getElementById('timestamp');
    const toggle     = document.getElementById('autopanToggle');
    const speedRow   = document.getElementById('speedRow');
    const speedSlider= document.getElementById('speedSlider');
    const speedVal   = document.getElementById('speedVal');

    let panInterval = null;
    let panIndex    = 0;
    let dragSrc     = null;

    // ---- Render list ----
    function renderList() {
      optionsEl.innerHTML = '';
      order.forEach((key, i) => {
        const s = SCENES[key];
        const wrap = document.createElement('div');
        wrap.className = 'option' + (panEnabled[key] ? '' : ' pan-excluded');
        wrap.draggable = true;
        wrap.dataset.key = key;
        wrap.innerHTML = `
          <input type="radio" name="scene" id="s_${key}" value="${key}" />
          <label for="s_${key}">
            <div class="drag-handle"><span></span><span></span><span></span></div>
            <div class="radio-indicator"></div>
            <div class="option-content">
              <div class="option-name">${s.label}</div>
              <div class="option-desc">${s.desc}</div>
            </div>
            <div class="option-num">${String(i + 1).padStart(2, '0')}</div>
          </label>
          <div class="pan-toggle ${panEnabled[key] ? 'included' : ''}" title="${panEnabled[key] ? 'Remove from auto-pan' : 'Add to auto-pan'}"></div>`;

        // Radio change
        wrap.querySelector('input').addEventListener('change', () => {
          if (toggle.checked) {
            toggle.checked = false;
            speedRow.classList.remove('enabled');
            stopAutoPan();
          }
          setScene(key);
        });

        // Pan toggle click
        wrap.querySelector('.pan-toggle').addEventListener('click', e => {
          e.stopPropagation();
          panEnabled[key] = !panEnabled[key];
          savePanEnabled();
          const pt = wrap.querySelector('.pan-toggle');
          pt.classList.toggle('included', panEnabled[key]);
          pt.title = panEnabled[key] ? 'Remove from auto-pan' : 'Add to auto-pan';
          wrap.classList.toggle('pan-excluded', !panEnabled[key]);
          // Restart pan if running so new set takes effect
          if (toggle.checked) { stopAutoPan(); startAutoPan(); }
        });

        // Drag events
        wrap.addEventListener('dragstart', e => {
          dragSrc = wrap;
          wrap.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', key);
        });

        wrap.addEventListener('dragend', () => {
          wrap.classList.remove('dragging');
          document.querySelectorAll('.option').forEach(el => el.classList.remove('drag-over'));
          dragSrc = null;
        });

        wrap.addEventListener('dragover', e => {
          e.preventDefault();
          if (dragSrc && dragSrc !== wrap) wrap.classList.add('drag-over');
        });

        wrap.addEventListener('dragleave', () => wrap.classList.remove('drag-over'));

        wrap.addEventListener('drop', e => {
          e.preventDefault();
          wrap.classList.remove('drag-over');
          if (!dragSrc || dragSrc === wrap) return;

          const fromKey = dragSrc.dataset.key;
          const toKey   = wrap.dataset.key;
          const fromIdx = order.indexOf(fromKey);
          const toIdx   = order.indexOf(toKey);

          order.splice(fromIdx, 1);
          order.splice(toIdx, 0, fromKey);

          localStorage.setItem('sceneOrder', JSON.stringify(order));
          renderList();
          restoreChecked();

          // If panning, restart so index stays valid
          if (toggle.checked) { stopAutoPan(); startAutoPan(); }
        });

        optionsEl.appendChild(wrap);
      });
    }

    function restoreChecked() {
      const prev = JSON.parse(localStorage.getItem('selectedScene') || 'null');
      if (prev) {
        const radio = document.querySelector(`input[value="${prev.key}"]`);
        if (radio) radio.checked = true;
      }
    }

    // ---- Scene set ----
    function setScene(key) {
      const s = SCENES[key];
      localStorage.setItem('selectedScene', JSON.stringify({ key, label: s.label, url: s.url, ts: Date.now() }));
      const radio = document.querySelector(`input[value="${key}"]`);
      if (radio) radio.checked = true;
      dot.classList.add('active');
      text.textContent = `scene set → ${s.label.toLowerCase()}`;
      tsEl.textContent = new Date().toLocaleTimeString();
    }

    // ---- Auto-pan ----
    function startAutoPan() {
      const active = panOrder();
      if (active.length === 0) {
        text.textContent = 'no scenes in pan';
        return;
      }
      const interval = parseInt(speedSlider.value) * 1000;
      const checked = document.querySelector('input[name="scene"]:checked');
      panIndex = checked ? active.indexOf(checked.value) : 0;
      if (panIndex < 0) panIndex = 0;
      panIndex = (panIndex + 1) % active.length;
      setScene(active[panIndex]);

      panInterval = setInterval(() => {
        const cur = panOrder();
        if (cur.length === 0) return;
        panIndex = (panIndex + 1) % cur.length;
        setScene(cur[panIndex]);
      }, interval);

      localStorage.setItem('autoPan', JSON.stringify({ active: true, interval: parseInt(speedSlider.value) }));
    }

    function stopAutoPan() {
      clearInterval(panInterval);
      panInterval = null;
      localStorage.setItem('autoPan', JSON.stringify({ active: false }));
    }

    toggle.addEventListener('change', () => {
      if (toggle.checked) {
        speedRow.classList.add('enabled');
        startAutoPan();
        text.textContent = 'auto-pan active';
      } else {
        speedRow.classList.remove('enabled');
        stopAutoPan();
        text.textContent = 'auto-pan off';
      }
    });

    speedSlider.addEventListener('input', () => {
      speedVal.textContent = `${speedSlider.value}s`;
      if (toggle.checked) { stopAutoPan(); startAutoPan(); }
    });

    // ---- Init ----
    renderList();

    const prev = JSON.parse(localStorage.getItem('selectedScene') || 'null');
    if (prev) {
      restoreChecked();
      dot.classList.add('active');
      text.textContent = `scene set → ${prev.label.toLowerCase()}`;
      tsEl.textContent = new Date(prev.ts).toLocaleTimeString();
    }

    const savedPan = JSON.parse(localStorage.getItem('autoPan') || 'null');
    if (savedPan?.active) {
      if (savedPan.interval) speedSlider.value = savedPan.interval;
      speedVal.textContent = `${speedSlider.value}s`;
      toggle.checked = true;
      speedRow.classList.add('enabled');
      startAutoPan();
    }
  </script>
</body>
</html>
