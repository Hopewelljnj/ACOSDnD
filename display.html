<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Display</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
    .img-slot {
      position: fixed; inset: 0;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .img-slot.active { opacity: 1; }
  </style>
</head>
<body>
  <script type="module">
    import { initializeApp }                  from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js';
    import { getDatabase, ref, onValue }      from 'https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js';

    const firebaseConfig = {
      apiKey:            "AIzaSyC3xn9E9g42oTeoHnrQDak83UI8ZOUqIt0",
      authDomain:        "acosdnd.firebaseapp.com",
      databaseURL:       "https://acosdnd-default-rtdb.firebaseio.com",
      projectId:         "acosdnd",
      storageBucket:     "acosdnd.firebasestorage.app",
      messagingSenderId: "663447589918",
      appId:             "1:663447589918:web:7602f774ee230b135b4a0f",
    };

    // ── SCENES — keep in sync with controls.html ─────────────────
    const SCENES = {
      card1: './card1.png',
      card2: './card2.png',
      card3: './card3.png',
      card4: './card4.png',
      card5: './card5.png',
      card6: './card6.png',
    };
    // ─────────────────────────────────────────────────────────────

    const app      = initializeApp(firebaseConfig);
    const db       = getDatabase(app);
    const stateRef = ref(db, 'controller/state');

    // Pre-create one slot per scene
    const slots = {};
    Object.entries(SCENES).forEach(([key, url]) => {
      const div = document.createElement('div');
      div.className = 'img-slot';
      div.style.backgroundImage = `url('${url}')`;
      document.body.appendChild(div);
      slots[key] = div;
    });

    let current = null;

    function showScene(key) {
      if (!key || key === current || !slots[key]) return;
      current = key;
      Object.entries(slots).forEach(([k, el]) => el.classList.toggle('active', k === key));
    }

    onValue(stateRef, snap => {
      const state = snap.val();
      if (state?.key) showScene(state.key);
    });
  </script>
</body>
</html>
